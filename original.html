                </ol>
              </div>

              {/* Source */}
              <div className="border-t border-warm/60 pt-6 mb-12">
                <p className="text-muted text-sm">
                  Adapted from <a href={recipe.sourceUrl} target="_blank" rel="noopener"
                    className="text-sage underline hover:text-sagedark">{recipe.sourceName}</a>
                </p>
              </div>

              {/* Prev/Next */}
              <div className="flex justify-between items-center border-t border-warm/60 pt-6">
                {prev ? (
                  <button onClick={() => onNavigate(prev.id)}
                    className="text-sm text-muted hover:text-sage transition-colors flex items-center gap-2">
                    ← {prev.name}
                  </button>
                ) : <div />}
                {next ? (
                  <button onClick={() => onNavigate(next.id)}
                    className="text-sm text-muted hover:text-sage transition-colors flex items-center gap-2">
                    {next.name} →
                  </button>
                ) : <div />}
              </div>
            </div>
          </div>
        );
      }

      function App() {
        const [currentRecipe, setCurrentRecipe] = useState(null);

        useEffect(() => {
          const handleHash = () => {
            const hash = window.location.hash.slice(2);
            if (hash && recipes.find(r => r.id === hash)) {
              setCurrentRecipe(hash);
            } else {
              setCurrentRecipe(null);
            }
          };
          handleHash();
          window.addEventListener('hashchange', handleHash);
          return () => window.removeEventListener('hashchange', handleHash);
        }, []);

        const navigate = (id) => {
          window.location.hash = id ? `/${id}` : '/';
          setCurrentRecipe(id);
          window.scrollTo(0, 0);
        };

        const recipe = recipes.find(r => r.id === currentRecipe);

        return (
          <div className="flex">
            <Sidebar currentRecipe={currentRecipe} onNavigate={navigate} />
            <MobileNav currentRecipe={currentRecipe} onNavigate={navigate} />
            <main className="flex-1 lg:ml-64 min-h-screen pt-14 lg:pt-0">
              {recipe ? (
                <RecipePage recipe={recipe} onNavigate={navigate} />
              ) : (
                <CoverPage onNavigate={navigate} />
              )}
            </main>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
